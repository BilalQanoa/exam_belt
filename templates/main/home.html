{% extends "base.html" %}

{% block title %}
Home - Dashboard
{% endblock title %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4 text-white" href="#">
            ProjectName
        </a>

        <div class="d-flex align-items-center gap-3">
            <span class="text-light fw-medium">
                Welcome, <span class="text-info fw-bold">{{ request.session.user_name }}</span>
            </span>

            <a href="{% url 'accounts:logout' %}" class="btn btn-outline-danger btn-sm px-3 rounded-pill fw-semibold">
                Log Out
            </a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row">
        <div class="col-12">
            <div class="card p-5 border-0 shadow-sm rounded-4 bg-white text-center">
                <div class="card-body">
                    <h1 class="fw-bold text-secondary mb-3">You are Successfully Logged In!</h1>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
