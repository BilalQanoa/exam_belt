{% extends "base.html" %}

{% block title %}
    Welcome
{% endblock title %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary fs-4" href="{% url 'accounts:index' %}">
            ProjectName
        </a>

        <div class="d-flex gap-2">
            <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary px-4 rounded-pill fw-semibold">
                Log-In
            </a>
            <a href="{% url 'accounts:register' %}" class="btn btn-primary px-4 rounded-pill fw-semibold shadow-sm">
                Sign-Up
            </a>
        </div>
    </div>
</nav>

<div class="container d-flex flex-column align-content-center justify-content-center align-items-center"
    style="min-height: 75vh;">
    <div class="text-center animate__animated animate__fadeIn">
        <h1 class="display-3 fw-extrabold text-secondary mb-3" style="letter-spacing: -1px;">
            Welcome to <span class="text-primary">My Project</span>
        </h1>
        <p class="lead text-muted fs-5 max-width-500 mx-auto mb-4">
            A modern, secure, and multi-app ecosystem built with Django and Bootstrap 5.
        </p>
        <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow">
            Get Started Free
        </a>
    </div>
</div>
{% endblock content %}
